spring.application.name=kialo-assistant
openai.key=${OPENAI_API_KEY}
server.port=8082

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:1234/termit/sluzby/auth/realms/termit
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://auth-server:8080/realms/termit/protocol/openid-connect/certs

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=create-drop