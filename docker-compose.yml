services:
  nginx:
    image: nginx:latest
    ports:
      - "127.0.0.1:${INTERNAL_HOST_PORT:-1234}:80"
    restart: always
    depends_on:
      - auth-server
      - termit
      - termit-server
      - termit-db-server
    environment:
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      ROOT: ${ROOT}
      ORIGIN: ${URL}
      PORT: ${PUBLIC_PORT:-''}
      APP_ORIGIN: "${PUBLIC_ORIGIN:-http://localhost:${INTERNAL_HOST_PORT:-1234}}"
      APP_ROOT_PATH: "${APP_ROOT_PATH:-}"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/auth.conf:/etc/nginx/auth.conf:ro

  auth-server-db:
    image: postgres:13
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: always
    volumes:
      - auth-server-db:/var/lib/postgresql/data

  auth-server:
    image: ghcr.io/kbss-cvut/keycloak-graphdb-user-replicator/keycloak-graphdb:latest
    command:
      - start --import-realm
    environment:
      KC_IMPORT: realm-export.json
      KC_HOSTNAME_URL: ${URL}${ROOT}/sluzby/auth
      KC_HOSTNAME_ADMIN_URL: ${URL}${ROOT}/sluzby/auth/
      KC_HOSTNAME_STRICT_BACKCHANNEL: false
      KC_PROXY: edge
      KC_HTTP_ENABLED: true
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      DB_VENDOR: POSTGRES
      DB_ADDR: auth-server-db
      DB_DATABASE: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_SCHEMA: public
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SERVER_URL: http://termit-db-server:7200
      DB_SERVER_REPOSITORY_ID: termit
      REPOSITORY_USERNAME: ${GDB_USERNAME}
      REPOSITORY_PASSWORD: ${GDB_PASSWORD}
      DB_SERVER_CONTEXT: http://onto.fel.cvut.cz/ontologies/application/termit/users
      VOCABULARY_USER_TYPE: http://onto.fel.cvut.cz/ontologies/application/termit/pojem/uživatel-termitu
      ADD_ACCOUNTS: false
      REALM_ID: termit
      GOOGLE_SECRET_KEY: ${GOOGLE_SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    restart: always
    volumes:
      - auth-server:/opt/keycloak/data
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      - auth-server-db

  termit-db-server:
    build:
      context: termit-db-server
    image: termit-db-server
    depends_on:
      - auth-server
    environment:
      GDB_JAVA_OPTS: -Dgraphdb.external-url=${URL}${ROOT}/sluzby/termit-db-server -Ddefault.min.distinct.threshold=67108864 -Dgraphdb.workbench.cors.enable=true -Dgraphdb.workbench.cors.origin=* -Dgraphdb.workbench.cors.expose-headers=*
    restart: always
    volumes:
      - ./termit-db-server/init-data:/root/graphdb-import:ro
      - ./termit-db-server/init-config:/repo-config:ro
      - termit-db-server:/opt/graphdb/home
      - ./termit-db-server/init-config/termit-config.ttl:/opt/graphdb/home/data/repositories/termit/config.ttl:ro

  termit-server:
    image: kbsscvut/termit
    depends_on:
      - termit-db-server
      - annotace-server
    environment:
      SERVER_FORWARDHEADERSSTRATEGY: framework
      SPRING_PROFILES_ACTIVE: lucene, no-cache
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      LOGGING_FILE_NAME: /tmp/storage/termit.log
      TERMIT_PERSISTENCE_LANGUAGE: cs
      TERMIT_REPOSITORY_URL: http://termit-db-server:7200/repositories/termit
      TERMIT_REPOSITORY_PUBLICURL: ${URL}${ROOT}/sluzby/termit-db-server/repositories/termit
      TERMIT_REPOSITORY_USERNAME: ${GDB_USERNAME}
      TERMIT_REPOSITORY_PASSWORD: ${GDB_PASSWORD}
      TERMIT_CORS_ALLOWEDORIGINS: ${PUBLIC_ORIGIN:-http://localhost:${INTERNAL_HOST_PORT:-1234}}
      TERMIT_FILE_STORAGE: /tmp/storage
      TERMIT_TEXTANALYSIS_URL: http://annotace-server:8080/annotate?enableKeywordExtraction=true
      TERMIT_LANGUAGE_TYPES_SOURCE: /tmp/z-sgov-glosář.ttl
      TERMIT_SECURITY_PROVIDER: oidc
      TERMIT_URL: ${URL}${ROOT}
      TERMIT_MODELINGTOOLURL: ${URL}${ROOT}/ontographer
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUERURI: ${URL}${ROOT}/sluzby/auth/realms/termit
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWKSETURI: http://auth-server:8080/realms/termit/protocol/openid-connect/certs
    volumes:
      - termit-server:/tmp/storage
      - ./termit-db-server/init-data/termit/graph--termit/z-sgov-glosář.ttl:/tmp/z-sgov-glosář.ttl

  annotace-server:
    image: ghcr.io/kbss-cvut/annotace/annotace-spark:latest
    volumes:
      - annotace-server:/tmp

  termit:
    image: kbsscvut/termit-ui
    depends_on:
      - termit-server
    environment:
      SERVER_URL: ${URL}${ROOT}/sluzby/server
      ADMIN_REGISTRATION_ONLY: "true"
      SHOW_PUBLIC_VIEW_ON_UNAUTHORIZED: "true"
      AUTHENTICATION: oidc
      AUTH_SERVER_URL: ${URL}${ROOT}/sluzby/auth/realms/termit
      AUTH_CLIENT_ID: termit-ui
      AUTH_SERVER_MANAGEMENT: ${URL}${ROOT}/sluzby/auth/admin/termit/console/
      AUTH_SERVER_USER_PROFILE: ${URL}${ROOT}/sluzby/auth/realms/termit/account/

  kialo-assistant:
    build:
      context: AP-BE
    ports:
      - "8082:8082"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://kialo-db:5432/${KIALO_DB_DB:-kialo_db}
      - SPRING_DATASOURCE_USERNAME=${KIALO_DB_USER:-kialo_admin}
      - SPRING_DATASOURCE_PASSWORD=${KIALO_DB_PASSWORD:-kialo_secret_pass}
      - SPRING_SQL_INIT_MODE=${KIALO_SQL_INIT_MODE:-never}
    depends_on:
      - kialo-db


  kialo-db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${KIALO_DB_DB:-kialo_db}
      POSTGRES_USER: ${KIALO_DB_USER:-kialo_admin}
      POSTGRES_PASSWORD: ${KIALO_DB_PASSWORD:-kialo_secret_pass}
    restart: always
    volumes:
      - kialo-db-data:/var/lib/postgresql/data

  web-client:
    build:
      context: AP-web-client
    ports:
      - "5173:5173"
    volumes:
      - ./AP-web-client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - kialo-assistant

  fallacy-detector:
    build:
      context: ./fallacy-detector
    expose:
      - "6161"
    volumes:
      - ./fallacy-detector/checkpoint-1344:/app/checkpoint-1344:ro
    command: uvicorn main:app --host 0.0.0.0 --port 6161
    restart: always

volumes:
  auth-server-db:
  auth-server:
  termit-db-server:
  termit-server:
  annotace-server:
  kialo-db-data: