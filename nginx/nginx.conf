worker_processes  1;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 25M;

    include mime.types;
    default_type application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name  localhost;

#         add_header Access-Control-Allow-Origin *;
        set $cors_origin "";
        if ($http_origin ~* "^http://localhost:5173$") {
            set $cors_origin $http_origin;
        }

        # KEYCLOAK SEKCE (Musí být odkomentovaná!)
        location ${ROOT}/sluzby/auth/ {
            # Přidání CORS hlaviček přímo sem
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            # Ošetření OPTIONS požadavku
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://auth-server:8080/; # Směrování na tvůj Keycloak
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffer_size   128k;
            proxy_buffers       4 256k;
            proxy_busy_buffers_size 256k;
        }
        location ${ROOT}/sluzby/auth {
            return 302 ${ORIGIN}/${ROOT}/sluzby/auth/;
        }

#         location ${ROOT}/sluzby/auth/ {
#             proxy_pass http://auth-server:8080/;
#             proxy_set_header Host $host;
#             proxy_set_header X-Forwarded-Host $host ;
#             proxy_set_header X-Forwarded-Port $http_x_forwarded_port;
#             proxy_set_header X-Real-IP $remote_addr;
#             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#             proxy_set_header Cookie $http_cookie;
#             proxy_set_header X-Forwarded-Proto $scheme;
#             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#
#             # Increase buffer sizes to handle large headers sent by Keycloak and its clients
#             proxy_buffer_size   128k;
#             proxy_buffers       4 256k;
#             proxy_busy_buffers_size 256k;
#         }

        location = ${ROOT}/sluzby/termit-db-server {
            return 302 ${ORIGIN}${ROOT}/sluzby/termit-db-server/;
        }

        location ${ROOT}/sluzby/termit-db-server/ {
             proxy_pass http://termit-db-server:7200/;
        }


        location = ${ROOT}/sluzby/server {
            return 302 ${ORIGIN}${ROOT}/sluzby/termit/;
        }

        location ${ROOT}/sluzby/server/ {
            proxy_http_version 1.1;
            proxy_pass http://termit-server:8080/termit/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix ${ROOT}/sluzby/server/;
            proxy_set_header X-Forwarded-Port ${PORT};
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location = ${ROOT}/sluzby/db-proxy {
            return 302 ${ORIGIN}${ROOT}/sluzby/termit-server/;
        }


        location = ${ROOT} {
            return 302 ${ORIGIN}${ROOT}/;
        }

        location ${ROOT}/ {
            rewrite ^${ROOT}/(.*) /$1 break;
            proxy_pass http://termit/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            #expires 30d;
            break;
        }

        location ${ROOT}/health-check {
            return 200;
            access_log off;
        }
    }
}
