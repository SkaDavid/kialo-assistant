<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome sidepanel</title>
    <script src="sidepanel.js" type="module"></script>

    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <h3>Kialo Assistant sidepanel</h3>

    <div id="login-section">
        <p>To use this extension, you need to log in.</p>
        <button id="btn-login">Log in through keycloak</button>
    </div>

    <div id="content-section" class="hidden">
        <button id="btn-logout" style="margin-top: 20px; background: #eee;">Log out</button>
        <div id="aiDebateContainer">
            <h1>Create a debate with AI</h1>
            <form action="">
                <label for="nameInput">Select a name for your dicussion</label>
                <input type="text" name="nameInput" id="nameInput" placeholder="Select a name for the discussion">

                <label for="thesis">Select the topic of the discussion</label>
                <input type="text" name="thesis" id="thesisInput" placeholder="Thesis">
                <input type="submit" id="ai" value="Create"></input>
            </form>
            <div id="generatedDebateContainer"></div>
        </div>
    </div>

</body>
</html>
